<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bicycle Hub | My Bookings</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">🚲 Bicycle Hub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="nav-links">
                    <li class="nav-item"><a class="nav-link" href="bicycles.html">Bicycles</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5 flex-grow-1">
        <h2 class="fw-bold mb-4">My Bookings</h2>
        
        <div id="loading" class="text-center py-5 d-none">
            <div class="loader"></div>
        </div>
        
        <div id="bookings-message" class="alert alert-info d-none text-center">You have no bookings yet.</div>

        <div class="table-responsive rounded shadow-sm bg-white" id="bookings-table-container">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="py-3">Image</th>
                        <th class="py-3">Bicycle Name</th>
                        <th class="py-3">Date Requested</th>
                        <th class="py-3">Days</th>
                        <th class="py-3">Total Price</th>
                        <th class="py-3">Status</th>
                        <th class="py-3 text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="bookings-body">
                    
                </tbody>
            </table>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2024 Bicycle Hub. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('bicycle_user'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            fetchMyBookings();
        });
    </script>
</body>
</html>
