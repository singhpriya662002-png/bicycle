<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bicycle Hub | Admin Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand text-white" href="index.html">🚲 Bicycle Hub | Admin</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="nav-links">
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5 flex-grow-1">
        <h2 class="fw-bold mb-4">Admin Dashboard</h2>
        
        <ul class="nav nav-tabs mb-4 border-0" id="adminTabs" role="tablist">
            <li class="nav-item me-2" role="presentation">
                <button class="nav-link active bg-white shadow-sm border-0 fw-bold rounded" id="bicycles-tab" data-bs-toggle="tab" data-bs-target="#manage-bicycles" type="button" role="tab" onclick="adminFetchBicycles()">Manage Bicycles</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link bg-white shadow-sm border-0 fw-bold rounded" id="bookings-tab" data-bs-toggle="tab" data-bs-target="#manage-bookings" type="button" role="tab" onclick="adminFetchBookings()">Manage Bookings</button>
            </li>
        </ul>
        
        <div class="tab-content" id="adminTabsContent">
            
            <div class="tab-pane fade show active" id="manage-bicycles" role="tabpanel">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="fw-bold m-0">All Bicycles</h4>
                    <button class="btn btn-primary fw-bold px-4" data-bs-toggle="modal" data-bs-target="#addBicycleModal">+ Add Bicycle</button>
                </div>
                <div class="table-responsive bg-white rounded shadow-sm">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="py-3">ID</th>
                                <th class="py-3">Image</th>
                                <th class="py-3">Name</th>
                                <th class="py-3">Type</th>
                                <th class="py-3">Price</th>
                                <th class="py-3 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-bicycles-body">
                            
                        </tbody>
                    </table>
                </div>
            </div>
            
            <div class="tab-pane fade" id="manage-bookings" role="tabpanel">
                <h4 class="fw-bold mb-3">All Bookings</h4>
                <div class="table-responsive bg-white rounded shadow-sm">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="py-3">ID</th>
                                <th class="py-3">User</th>
                                <th class="py-3">Bicycle</th>
                                <th class="py-3">Date</th>
                                <th class="py-3">Days</th>
                                <th class="py-3">Total Price</th>
                                <th class="py-3">Status</th>
                                <th class="py-3 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-bookings-body">
                            
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addBicycleModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-light border-0">
                    <h5 class="modal-title fw-bold">Add New Bicycle</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="add-bicycle-form">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Name</label>
                            <input type="text" class="form-control" id="add-name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Type</label>
                            <select class="form-select" id="add-type" required>
                                <option value="Mountain">Mountain</option>
                                <option value="Road">Road</option>
                                <option value="Hybrid">Hybrid</option>
                                <option value="Racing">Racing</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Price ($/day)</label>
                            <input type="number" class="form-control" id="add-price" step="0.01" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">Image File</label>
                            <input type="file" class="form-control" id="add-image" accept="image/*" required>
                        </div>
                        <div id="add-error" class="alert alert-danger d-none py-2 text-center" role="alert"></div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Save Bicycle</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('bicycle_user'));
            if (!user || user.role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }
            adminFetchBicycles();
        });
    </script>
</body>
</html>
