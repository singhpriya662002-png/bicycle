<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bicycle Hub | Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">🚲 Bicycle Hub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="nav-links">
                    <li class="nav-item"><a class="nav-link" href="bicycles.html">Bicycles</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5 flex-grow-1">
        <div class="row justify-content-center align-items-center h-100">
            <div class="col-md-6 col-lg-5">
                
                <div class="card shadow-sm mb-4 border-0" id="login-card">
                    <div class="card-body p-5">
                        <h3 class="fw-bold text-center mb-4">Welcome Back</h3>
                        <form id="login-form">
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">Email address</label>
                                <input type="email" class="form-control form-control-lg" id="login-email" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">Password</label>
                                <input type="password" class="form-control form-control-lg" id="login-password" required>
                            </div>
                            <div id="login-error" class="alert alert-danger d-none py-2 text-center" role="alert"></div>
                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Login</button>
                        </form>
                        <hr class="my-4">
                        <p class="text-center mb-0 text-muted">Don't have an account? <a href="#" id="show-register" class="fw-bold text-primary text-decoration-none">Register here</a></p>
                    </div>
                </div>

                <div class="card shadow-sm mb-4 border-0 d-none" id="register-card">
                    <div class="card-body p-5">
                        <h3 class="fw-bold text-center mb-4">Create Account</h3>
                        <form id="register-form">
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">Full Name</label>
                                <input type="text" class="form-control form-control-lg" id="reg-name" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">Email address</label>
                                <input type="email" class="form-control form-control-lg" id="reg-email" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">Password</label>
                                <input type="password" class="form-control form-control-lg" id="reg-password" required>
                            </div>
                            <div id="reg-error" class="alert alert-danger d-none py-2 text-center" role="alert"></div>
                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Register</button>
                        </form>
                        <hr class="my-4">
                        <p class="text-center mb-0 text-muted">Already have an account? <a href="#" id="show-login" class="fw-bold text-primary text-decoration-none">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2024 Bicycle Hub. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('show-register').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('login-card').classList.add('d-none');
            document.getElementById('register-card').classList.remove('d-none');
        });
        document.getElementById('show-login').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('register-card').classList.add('d-none');
            document.getElementById('login-card').classList.remove('d-none');
        });
    </script>
</body>
</html>
