<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bicycle Hub | Browse Bicycles</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">🚲 Bicycle Hub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="nav-links">
                    <li class="nav-item"><a class="nav-link active fw-bold" href="bicycles.html">Bicycles</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5 flex-grow-1">
        <h2 class="fw-bold mb-4">Browse Bicycles</h2>

        <div class="row mb-4 bg-white p-3 rounded shadow-sm">
            <div class="col-md-6 mb-2 mb-md-0">
                <input type="text" id="search-input" class="form-control" placeholder="Search by name...">
            </div>
            <div class="col-md-4 mb-2 mb-md-0">
                <select id="type-filter" class="form-select">
                    <option value="">All Types</option>
                    <option value="Mountain">Mountain</option>
                    <option value="Road">Road</option>
                    <option value="Hybrid">Hybrid</option>
                    <option value="Racing">Racing</option>
                </select>
            </div>
            <div class="col-md-2">
                <button id="filter-btn" class="btn btn-primary w-100">Filter</button>
            </div>
        </div>

        <div id="loading" class="text-center py-5 d-none">
            <div class="loader"></div>
        </div>
        
        <div id="bicycles-container" class="row g-4">
            
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2024 Bicycle Hub. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchBicycles();
            
            document.getElementById('filter-btn').addEventListener('click', () => {
                const search = document.getElementById('search-input').value;
                const type = document.getElementById('type-filter').value;
                fetchBicycles(search, type);
            });
        });
    </script>
</body>
</html>
